<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; connect-src 'none'; base-uri 'none';"
  />
  <title>SysWidget</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="panel">
    <div class="grid">
      <canvas id="cpu-gauge" width="120" height="120"></canvas>
      <canvas id="ram-gauge" width="120" height="120"></canvas>
      <canvas id="disk-gauge" width="120" height="120"></canvas>
      <canvas id="gpu0-gauge" width="120" height="120"></canvas>
      <canvas id="gpu1-gauge" width="120" height="120"></canvas>
    </div>
    <div id="net">-- Mb/s</div>
    <script type="module" src="app.js"></script>
    <div class="controls">
      <button id="pause-btn" class="btn">⏸ Pause</button>
      <button id="close-btn" class="btn btn-close">✕</button>
    </div>
  </div>
</body>
</html>
