<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; connect-src 'none'; base-uri 'none';"
  />
  <title>SysWidget</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="frame">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <header class="nameplate">
      <span class="nameplate-title">SYSWIDGET V1.0.5</span>
      <div class="nameplate-right">
        <span class="status">
          <button id="pause-btn" class="pause-toggle" aria-label="Mettre en pause">⏸</button>
          <span class="led" id="led"></span>
          <span id="status-text">LIVE</span>
        </span>
        <div class="win-controls">
          <button id="min-btn" class="win-btn" aria-label="Réduire">–</button>
          <button id="max-btn" class="win-btn" aria-label="Agrandir">▢</button>
          <button id="winclose-btn" class="win-btn win-btn-close" aria-label="Fermer">×</button>
        </div>
      </div>
    </header>

    <div class="grid-2">
      <canvas id="cpu-gauge" width="120" height="142"></canvas>
      <canvas id="ram-gauge" width="120" height="142"></canvas>
    </div>

    <div class="section">
      <div class="section-title">DISQUE(S)</div>
      <div class="dyn-grid" id="disk-grid"></div>
    </div>

    <div class="section">
      <div class="section-title">GPU</div>
      <div class="dyn-grid" id="gpu-grid"></div>
    </div>

    <div class="section">
      <div class="section-title">RÉSEAU</div>
      <div class="net-label in">↓ ENTRANT <span id="net-rx">0.0</span> Mb/s</div>
      <canvas id="net-graph-in" height="30"></canvas>
      <div class="net-label out">↑ SORTANT <span id="net-tx">0.0</span> Mb/s</div>
      <canvas id="net-graph-out" height="30"></canvas>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
